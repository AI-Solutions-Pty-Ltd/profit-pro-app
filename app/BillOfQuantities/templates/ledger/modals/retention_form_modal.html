<!-- Retention Form Modal -->
<div id="retention_form_modal"
     class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-10 mx-auto p-5 border max-w-4xl shadow-lg rounded-md bg-white">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-medium text-gray-900">Retention Form</h3>
            <button onclick="closeRetentionFormModal()"
                    class="text-gray-400 hover:text-gray-500">{% heroicon_outline "x-mark" class="w-6 h-6" %}</button>
        </div>
        <div class="mt-2">{% include "../components/retention_form_component.html" %}</div>
    </div>
</div>
<script>
function openRetentionFormModal() {
    document.getElementById('retention_form_modal').classList.remove('hidden');
}

function closeRetentionFormModal() {
    document.getElementById('retention_form_modal').classList.add('hidden');
}

// Close modal when clicking outside
document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('retention_form_modal');
    if (modal) {
        modal.addEventListener('click', function(e) {
            if (e.target === this) {
                closeRetentionFormModal();
            }
        });
    }
});

// Close modal on Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeRetentionFormModal();
    }
});
</script>
