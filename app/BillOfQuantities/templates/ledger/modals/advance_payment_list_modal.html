<!-- Advance Payment List Modal -->
<div id="advance_payment_list_modal"
     class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-10 mx-auto p-5 border max-w-7xl shadow-lg rounded-md bg-white">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-medium text-gray-900">Advance Payment List</h3>
            <button onclick="closeAdvancePaymentListModal()"
                    class="text-gray-400 hover:text-gray-500">{% heroicon_outline "x-mark" class="w-6 h-6" %}</button>
        </div>
        <div class="mt-2">{% include "../components/advance_payment_list_component.html" %}</div>
    </div>
</div>
<script>
function openAdvancePaymentListModal() {
    document.getElementById('advance_payment_list_modal').classList.remove('hidden');
}

function closeAdvancePaymentListModal() {
    document.getElementById('advance_payment_list_modal').classList.add('hidden');
}

// Close modal when clicking outside
document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('advance_payment_list_modal');
    if (modal) {
        modal.addEventListener('click', function(e) {
            if (e.target === this) {
                closeAdvancePaymentListModal();
            }
        });
    }
});

// Close modal on Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeAdvancePaymentListModal();
    }
});
</script>
