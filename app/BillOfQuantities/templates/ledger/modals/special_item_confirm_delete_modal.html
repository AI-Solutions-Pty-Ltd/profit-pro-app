<!-- Special Item Delete Confirmation Modal -->
<div id="special_item_confirm_delete_modal"
     class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
        <div class="mt-3">
            <div class="flex items-center justify-center w-12 h-12 mx-auto bg-red-100 rounded-full">
                {% heroicon_outline "exclamation-triangle" class="w-6 h-6 text-red-600" %}
            </div>
            <h3 class="text-lg font-medium text-gray-900 text-center mt-4">Delete Special Item</h3>
            <div class="mt-2 px-7 py-3">
                <p class="text-sm text-gray-500 text-center">
                    Are you sure you want to delete this special item transaction?
                </p>
                <div class="mt-4 bg-gray-50 rounded-lg p-3">
                    <p class="text-sm font-medium text-gray-900" id="delete_special_item_description"></p>
                    <p class="text-xs text-gray-500 mt-1">
                        Date: <span id="delete_special_item_date"></span>
                    </p>
                    <p class="text-xs text-gray-500">
                        Amount: R <span id="delete_special_item_amount"></span>
                    </p>
                </div>
                <p class="text-sm text-red-600 text-center mt-3 font-medium">
                    This action cannot be undone.
                </p>
            </div>
            <div class="flex items-center justify-center gap-3 px-4 py-3">
                <button onclick="closeSpecialItemConfirmDeleteModal()"
                        class="px-4 py-2 bg-white text-gray-700 text-sm font-medium rounded-md border border-gray-300 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Cancel
                </button>
                <form id="delete_special_item_form" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit"
                            class="px-4 py-2 bg-red-600 text-white text-sm font-medium rounded-md hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                        Delete
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function openSpecialItemConfirmDeleteModal(projectPk, txnId, description, date, amount) {
    document.getElementById('delete_special_item_description').textContent = description;
    document.getElementById('delete_special_item_date').textContent = date;
    document.getElementById('delete_special_item_amount').textContent = amount.toLocaleString('en-ZA', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    
    const form = document.getElementById('delete_special_item_form');
    form.action = `/projects/${projectPk}/special-items/${txnId}/delete/`;
    
    document.getElementById('special_item_confirm_delete_modal').classList.remove('hidden');
}

function closeSpecialItemConfirmDeleteModal() {
    document.getElementById('special_item_confirm_delete_modal').classList.add('hidden');
}

// Close modal when clicking outside
document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('special_item_confirm_delete_modal');
    if (modal) {
        modal.addEventListener('click', function(e) {
            if (e.target === this) {
                closeSpecialItemConfirmDeleteModal();
            }
        });
    }
});

// Close modal on Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeSpecialItemConfirmDeleteModal();
    }
});
</script>
