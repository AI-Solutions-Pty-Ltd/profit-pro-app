<!-- Materials Confirm Delete Modal -->
<div id="materials_confirm_delete_modal"
     class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-20 mx-auto p-5 border max-w-2xl shadow-lg rounded-md bg-white">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-medium text-gray-900">Delete Materials Transaction</h3>
            <button onclick="closeMaterialsConfirmDeleteModal()"
                    class="text-gray-400 hover:text-gray-500">{% heroicon_outline "x-mark" class="w-6 h-6" %}</button>
        </div>
        <div class="mt-2">
            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4">
                <div class="flex">
                    <div class="flex-shrink-0">{% heroicon_outline "exclamation-triangle" class="h-5 w-5 text-yellow-400" %}</div>
                    <div class="ml-3">
                        <p class="text-sm text-yellow-700">You are about to delete this transaction. This action cannot be undone.</p>
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 rounded-lg p-4 mb-4">
                <dl class="grid grid-cols-2 gap-4">
                    <div>
                        <dt class="text-sm font-medium text-gray-500">Date</dt>
                        <dd class="mt-1 text-sm text-gray-900" id="materials_delete_txn_date">
                            -
                        </dd>
                    </div>
                    <div>
                        <dt class="text-sm font-medium text-gray-500">Amount</dt>
                        <dd class="mt-1 text-sm text-gray-900" id="materials_delete_txn_amount">
                            -
                        </dd>
                    </div>
                    <div class="col-span-2">
                        <dt class="text-sm font-medium text-gray-500">Material Description</dt>
                        <dd class="mt-1 text-sm text-gray-900"
                            id="materials_delete_txn_description">
                            -
                        </dd>
                    </div>
                </dl>
            </div>
            <form id="materials_delete_form" method="post" action="">
                {% csrf_token %}
                <div class="flex justify-end space-x-3">
                    <button type="button"
                            onclick="closeMaterialsConfirmDeleteModal()"
                            class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                        Cancel
                    </button>
                    <button type="submit"
                            class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700">
                        {% heroicon_outline "trash" class="w-4 h-4 mr-2" %}
                        Delete Transaction
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    function openMaterialsConfirmDeleteModal(projectPk, txnId, description, date, amount) {
        document.getElementById('materials_delete_txn_date').textContent = date;
        document.getElementById('materials_delete_txn_description').textContent = description;
        document.getElementById('materials_delete_txn_amount').textContent = 'R ' + parseFloat(amount).toLocaleString('en-ZA', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        
        document.getElementById('materials_delete_form').action = `/bill-of-quantities/project/${projectPk}/materials-on-site/${txnId}/delete/`;
        
        document.getElementById('materials_confirm_delete_modal').classList.remove('hidden');
    }

    function closeMaterialsConfirmDeleteModal() {
        document.getElementById('materials_confirm_delete_modal').classList.add('hidden');
    }

    document.addEventListener('DOMContentLoaded', function() {
        const modal = document.getElementById('materials_confirm_delete_modal');
        if (modal) {
            modal.addEventListener('click', function(e) {
            if (e.target === this) {
                closeMaterialsConfirmDeleteModal();
            }
        });
    }
});

// Close modal on Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeMaterialsConfirmDeleteModal();
    }
});
</script>
