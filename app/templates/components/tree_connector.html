<!-- Reusable Tree Connector Component -->
{% if not is_last %}
    <!-- Full vertical line for siblings -->
    <div class="absolute left-4 top-0 bottom-0 w-0.5 {{ line_color|default:'bg-gray-200' }}"></div>
{% else %}
    <!-- Short vertical line for the last sibling -->
    <div class="absolute left-4 top-0 h-6 w-0.5 {{ line_color|default:'bg-gray-200' }}"></div>
{% endif %}
<!-- Horizontal connector branching to the node icon -->
<div class="absolute left-4 top-6 w-4 h-0.5 {{ line_color|default:'bg-gray-200' }}"></div>
