{% extends "base_full.html" %}
{% block title %}
    Delete Notice - {{ block.super }}
{% endblock title %}
{% block content %}
    <div class="max-w-2xl mx-auto bg-white shadow-md rounded-lg border border-gray-200 p-6">
        <h1 class="text-xl font-bold text-gray-900 mb-3">Delete Notice</h1>
        <p class="text-sm text-gray-700 mb-6">Are you sure you want to delete this notice?</p>
        <blockquote class="border-l-4 border-red-200 pl-4 text-sm text-gray-600 mb-6">{{ object.text }}</blockquote>
        <form method="post" class="flex items-center gap-3">
            {% csrf_token %}
            <button type="submit"
                    class="inline-flex items-center px-4 py-2 rounded-md text-sm font-medium text-white bg-red-600 hover:bg-red-700 transition-colors">
                Delete
            </button>
            <a href="{% url 'notices:list' %}" class="text-sm text-gray-600 hover:text-gray-800">Cancel</a>
        </form>
    </div>
{% endblock content %}
