{% load heroicons %}
<dialog id="dynamic-quick-create-modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box p-0 w-11/12 max-w-2xl bg-white border border-gray-100 shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="flex justify-between items-center px-6 py-5 bg-white border-b border-gray-100">
            <div class="flex items-center">
                <div class="p-2 mr-3 rounded-lg bg-indigo-50 text-indigo-600">
                    {% heroicon_outline "plus-circle" size="24" %}
                </div>
                <h3 id="dynamic-modal-title" class="text-xl font-bold tracking-tight text-gray-900">Quick Create</h3>
            </div>
            <form method="dialog">
                <button class="p-2 text-gray-400 hover:text-gray-600 rounded-lg transition-colors bg-gray-50 hover:bg-gray-100">
                    {% heroicon_outline "x-mark" size="20" %}
                </button>
            </form>
        </div>

        <form id="dynamic-quick-create-form" onsubmit="submitDynamicQuickCreate(event)">
            {% csrf_token %}
            <!-- This will be populated via AJAX -->
            <div id="dynamic-modal-content" class="px-8 py-6 space-y-5 max-h-[60vh] overflow-y-auto custom-scrollbar">
                <div class="flex flex-col items-center justify-center py-12 space-y-4">
                    <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-sm font-medium text-gray-500">Loading form...</p>
                </div>
            </div>

            <!-- Global Error Container -->
            <div id="dynamic-modal-errors" class="hidden px-8 py-2">
                <div class="p-4 bg-red-50 rounded-xl border border-red-200">
                    <div class="flex">
                        <div class="flex-shrink-0">{% heroicon_solid "x-circle" class="w-5 h-5 text-red-500" %}</div>
                        <div class="ml-3">
                            <h3 class="text-xs font-bold tracking-wider text-red-800 uppercase">Validation Error</h3>
                            <div class="mt-1 text-sm text-red-700" id="dynamic-error-list"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer Actions -->
            <div class="modal-action mt-0 px-8 py-5 bg-gray-50 border-t border-gray-100 flex justify-end space-x-3">
                <button type="button"
                        onclick="closeDynamicQuickCreateModal()"
                        class="btn btn-ghost bg-white border-gray-300 text-gray-700 hover:bg-gray-50">Cancel</button>
                <button type="submit"
                        id="dynamic-modal-submit"
                        class="btn btn-primary px-10 bg-indigo-600 hover:bg-indigo-700 border-none text-white shadow-lg shadow-indigo-200/50">
                    <span id="dynamic-submit-text">Create & Select</span>
                    <div id="dynamic-submit-spinner" class="hidden ml-2">
                        <svg class="w-4 h-4 text-white animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>
                </button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>close</button>
    </form>
</dialog>
