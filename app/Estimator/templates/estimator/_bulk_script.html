<script>
(function () {
    const selectAll = document.getElementById('select-all');
    const toolbar = document.getElementById('bulk-toolbar');
    const counter = document.getElementById('bulk-count');
    const rowChecks = () => document.querySelectorAll('.row-check');
    const update = () => {
        const visible = Array.from(rowChecks()).filter(c => c.closest('tr').style.display !== 'none');
        const checked = visible.filter(c => c.checked);
        if (counter) counter.textContent = checked.length;
        if (toolbar) toolbar.classList.toggle('hidden', checked.length === 0);
        if (selectAll) {
            selectAll.checked = visible.length > 0 && checked.length === visible.length;
            selectAll.indeterminate = checked.length > 0 && checked.length < visible.length;
        }
    };
    if (selectAll) {
        selectAll.addEventListener('change', e => {
            rowChecks().forEach(c => {
                if (c.closest('tr').style.display !== 'none') c.checked = e.target.checked;
            });
            update();
        });
    }
    rowChecks().forEach(c => c.addEventListener('change', update));
    window.__updateBulk = update;

    const search = document.getElementById('cost-search');
    if (search) {
        const apply = () => {
            const q = search.value.trim().toLowerCase();
            document.querySelectorAll('tr.bulk-row').forEach(row => {
                const match = !q || (row.dataset.search || '').includes(q);
                row.style.display = match ? '' : 'none';
                if (!match) {
                    const cb = row.querySelector('.row-check');
                    if (cb && cb.checked) cb.checked = false;
                }
            });
            update();
        };
        search.addEventListener('input', apply);
        if (search.value) apply();
    }
    update();
})();
</script>
