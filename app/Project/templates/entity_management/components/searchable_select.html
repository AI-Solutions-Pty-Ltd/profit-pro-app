{% load heroicons %}
<div class="relative searchable-select-container"
     id="{{ id_prefix }}-selector-container"
     x-data="{ open: false, search: '' }">
    <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
    <button type="button"
            onclick="toggleSearchableDropdown('{{ id_prefix }}')"
            id="{{ id_prefix }}-selector-btn"
            class="w-full flex items-center justify-between bg-white border border-gray-300 rounded-md px-4 py-2 text-sm font-medium text-gray-700 hover:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all shadow-sm">
        <span id="{{ id_prefix }}-selector-label">
            {% if field.value %}
                {% for choice_id, choice_label in field.field.choices %}
                    {% if choice_id|stringformat:"s" == field.value|stringformat:"s" %}{{ choice_label }}{% endif %}
                {% endfor %}
            {% else %}
                {{ field.field.empty_label|default:"Choose options..." }}
            {% endif %}
        </span>
        {% heroicon_outline "chevron-down" size="20" class="text-gray-400 transition-transform" id="{{ id_prefix }}-selector-arrow" %}
    </button>
    <!-- Dropdown Menu -->
    <div id="{{ id_prefix }}-dropdown"
         class="hidden absolute left-0 mt-2 w-full bg-white border border-gray-200 rounded-lg shadow-2xl z-50 overflow-hidden transform origin-top transition-all">
        <div class="p-2 border-b border-gray-100 bg-gray-50">
            <div class="relative">
                {% heroicon_outline "magnifying-glass" size="18" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" %}
                <input type="text"
                       id="{{ id_prefix }}-search"
                       placeholder="Search {{ field.label|lower }}..."
                       class="w-full pl-10 pr-4 py-2 text-sm border-gray-200 rounded-md focus:ring-indigo-500 focus:border-indigo-500"
                       onkeyup="filterSearchableOptions('{{ id_prefix }}')">
            </div>
        </div>
        <div class="max-h-60 overflow-y-auto p-1"
             id="{{ id_prefix }}-options-list">
            {% for choice_id, choice_label in field.field.choices %}
                {% if choice_id %}
                    <button type="button"
                            class="w-full text-left flex items-center px-3 py-2 rounded-md hover:bg-indigo-50 group transition-colors option-item"
                            data-id="{{ choice_id }}"
                            data-label="{{ choice_label|lower }}"
                            onclick="selectSearchableOption('{{ id_prefix }}', '{{ choice_id }}', '{{ choice_label|escapejs }}')">
                        <span class="block text-sm font-medium text-gray-700 group-hover:text-indigo-900">{{ choice_label }}</span>
                    </button>
                {% endif %}
            {% endfor %}
            <div id="{{ id_prefix }}-no-results"
                 class="hidden p-4 text-center text-sm text-gray-500 italic">No matches found</div>
        </div>
        {% if create_url %}
            <div class="p-2 border-t border-gray-100 bg-gray-50">
                <button type="button"
                        onclick="openQuickCreateModal('{{ id_prefix }}')"
                        class="w-full inline-flex items-center justify-center px-4 py-2 text-xs font-bold text-indigo-600 hover:text-indigo-700 hover:bg-indigo-100/50 rounded-md transition-all">
                    {% heroicon_outline "plus" size="16" class="mr-1.5" %}
                    Create New {{ field.label }}
                </button>
            </div>
        {% endif %}
    </div>
    <!-- Hidden native select for form data -->
    <div class="hidden">{{ field }}</div>
</div>
