<!-- Delete Drawing Type Modal -->
<div id="deleteDrawingTypeModal"
     class="hidden fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity z-50">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full">
            <div class="px-6 py-4 border-b border-gray-200">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-semibold text-gray-900">Delete Drawing Type</h3>
                    <button type="button"
                            onclick="closeDeleteDrawingTypeModal()"
                            class="text-gray-400 hover:text-gray-500">
                        {% heroicon_outline "x-mark" size="20" %}
                    </button>
                </div>
            </div>
            <form method="post" id="deleteDrawingTypeForm">
                {% csrf_token %}
                <div class="px-6 py-4">
                    <div class="flex items-start">
                        <div class="flex-shrink-0">{% heroicon_outline "exclamation-triangle" size="24" class="text-red-600" %}</div>
                        <div class="ml-3">
                            <p class="text-sm text-gray-700">
                                Are you sure you want to delete the drawing type <strong id="delete_drawing_type_name"></strong>?
                            </p>
                            <p class="text-sm text-gray-500 mt-2" id="delete_drawing_type_warning"></p>
                        </div>
                    </div>
                </div>
                <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex justify-end gap-3">
                    <button type="button"
                            onclick="closeDeleteDrawingTypeModal()"
                            class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Cancel
                    </button>
                    <button type="submit"
                            class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                        {% heroicon_outline "trash" size="16" class="inline mr-1" %}
                        Delete Drawing Type
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    const deleteDrawingTypeModal = document.getElementById('deleteDrawingTypeModal');
    const deleteDrawingTypeForm = deleteDrawingTypeModal.querySelector('#deleteDrawingTypeForm');

    function openDeleteDrawingTypeModal(id, name, drawingCount) {
        deleteDrawingTypeModal.classList.remove('hidden');
        deleteDrawingTypeModal.querySelector('#delete_drawing_type_name').textContent = name;
        deleteDrawingTypeModal.dataset.drawingTypeId = id;
        const warning = deleteDrawingTypeModal.querySelector('#delete_drawing_type_warning');
        if (drawingCount > 0) {
            warning.textContent = `This type is currently used by ${drawingCount} drawing${drawingCount > 1 ? 's' : ''}. Those drawings will have their type cleared.`;
        } else {
            warning.textContent = 'This drawing type is not currently used by any drawings.';
        }
    }

    function closeDeleteDrawingTypeModal() {
        deleteDrawingTypeModal.classList.add('hidden');
    }

    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            closeDeleteDrawingTypeModal();
        }
    });

    deleteDrawingTypeModal.addEventListener('click', function(event) {
        if (event.target === this) closeDeleteDrawingTypeModal();
    });

    deleteDrawingTypeForm.addEventListener('submit', async function(event) {
        event.preventDefault();
        const drawingTypeId = deleteDrawingTypeModal.dataset.drawingTypeId;
        try {
            const response = await fetch(`/project/{{ project.pk }}/drawing-types/${drawingTypeId}/delete/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ CSRF_TOKEN }}'
                },
                body: JSON.stringify({})
            });
            const result = await response.json();
            if (result.success) {
                window.location.reload();
            } else {
                alert('Drawing type could not be deleted.');
                console.error('Errors:', result);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('An error occurred while deleting the drawing type');
        }
    });
</script>
