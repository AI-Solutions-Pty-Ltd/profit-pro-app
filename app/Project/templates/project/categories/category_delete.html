<!-- Delete Modal -->
<div id="deleteCategoryModal"
     class="hidden fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity z-50">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full">
            <div class="px-6 py-4 border-b border-gray-200">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-semibold text-gray-900">Delete Category</h3>
                    <button type="button"
                            onclick="closeDeleteCategoryModal()"
                            class="text-gray-400 hover:text-gray-500">
                        {% heroicon_outline "x-mark" size="20" %}
                    </button>
                </div>
            </div>
            <form method="post" id="deleteForm">
                {% csrf_token %}
                <div class="px-6 py-4">
                    <div class="flex items-start">
                        <div class="flex-shrink-0">{% heroicon_outline "exclamation-triangle" size="24" class="text-red-600" %}</div>
                        <div class="ml-3">
                            <p class="text-sm text-gray-700">
                                Are you sure you want to delete the category <strong id="delete_category_name"></strong>?
                            </p>
                            <p class="text-sm text-gray-500 mt-2" id="delete_warning"></p>
                        </div>
                    </div>
                </div>
                <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex justify-end gap-3">
                    <button type="button"
                            onclick="closeDeleteCategoryModal()"
                            class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Cancel
                    </button>
                    <button type="submit"
                            class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                        {% heroicon_outline "trash" size="16" class="inline mr-1" %}
                        Delete Category
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    // Delete Modal Functions
    const categoryDeleteModal = document.getElementById('deleteCategoryModal')
    const categoryDeleteForm = categoryDeleteModal.querySelector('#deleteForm')

    function openDeleteCategoryModal(id, name, projectCount) {
        project_id = {{project.pk}}
        categoryDeleteModal.classList.remove('hidden');
        categoryDeleteForm.action = "/project/" + project_id + "/categories/" + id + "/delete/";
    }

    function closeDeleteCategoryModal() {
        categoryDeleteModal.classList.add('hidden');
    }

    // Form submission
    categoryDeleteForm.addEventListener('submit', async function(event) {
        event.preventDefault();
        
        const formAction = this.action;
        
        try {
            const response = await fetch(formAction, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ CSRF_TOKEN }}'
                },
                body: JSON.stringify({})
            });
            
            const result = await response.json();
            
            if (result.success) {
                window.location.reload();
            } else {
                alert('Category could not be deleted');
                console.error('Errors:', result);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('An error occurred while deleting the category');
        }
    });

    // Close modals on escape key
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            closeDeleteCategoryModal();
        }
    });

    categoryDeleteModal.addEventListener('click', function(event) {
        if (event.target === this) closeDeleteCategoryModal();
    });
</script>
