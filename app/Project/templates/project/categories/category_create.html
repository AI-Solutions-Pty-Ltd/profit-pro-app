<!-- Create Modal -->
<div id="createCategoryModal"
     class="hidden fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity z-50">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full">
            <div class="px-6 py-4 border-b border-gray-200">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-semibold text-gray-900">Add New Category</h3>
                    <button type="button"
                            onclick="closeCreateModal()"
                            class="text-gray-400 hover:text-gray-500">
                        {% heroicon_outline "x-mark" size="20" %}
                    </button>
                </div>
            </div>
            <form method="post" id="createCategoryForm">
                {% csrf_token %}
                <div class="px-6 py-4 space-y-4">
                    <div>{{ form.name|as_crispy_field }}</div>
                    <div>{{ form.description|as_crispy_field }}</div>
                </div>
                <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex justify-end gap-3">
                    <button type="button"
                            onclick="closeCreateModal()"
                            class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Cancel
                    </button>
                    <button type="submit"
                            class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        {% heroicon_outline "plus" size="16" class="inline mr-1" %}
                        Create Category
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    // Create Modal Functions
    const categoryCreateForm = document.getElementById("createCategoryForm");

    function openCreateModal(context, returnUrl = null) {
        const modal = document.getElementById("createCategoryModal");
        modal.classList.remove('hidden');
        modal.querySelector('#id_name').focus();
        
        // Update form action with return_url if provided
        if (returnUrl) {
            
            const currentAction = categoryCreateForm.getAttribute('action');
            const separator = currentAction.includes('?') ? '&' : '?';
            form.setAttribute('action', currentAction + separator + returnUrl.substring(1));
        }
    }

    function closeCreateModal() {
        document.getElementById("createCategoryModal").classList.add('hidden');
    }

    // Close modals when clicking outside
    document.getElementById("createCategoryModal").addEventListener('click', function(event) {
        if (event.target === this) closeCreateModal();
    });

    // Close modals on escape key
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            closeCreateModal();
        }
    });

    categoryCreateForm.addEventListener('submit', async (e) => {
        e.preventDefault(); // Stop page refresh

        // Extract data from the form
        const formData = new FormData(categoryCreateForm);
        const data = Object.fromEntries(formData.entries());
        
        // Get the current form action to extract return_url
        const formAction = categoryCreateForm.getAttribute('action') || '';
        try {
            const response = await fetch("{% url 'project:project-category-create' project.pk %}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ CSRF_TOKEN }}'
            },
            body: JSON.stringify(data)
            });

            const result = await response.json();
            console.log('Success:', result);
            
            // Handle success
            if (result.success) {
                // Close modal
                window.location.reload();
            } else {
                // Show errors
                alert("Category could not be created")
                console.error('Errors:', result.errors);
            }
        } catch (error) {
            console.error('Error:', error);
        }
    });
</script>
