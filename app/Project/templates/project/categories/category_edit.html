<!-- Edit Modal -->
<div id="editCategoryModal"
     class="hidden fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity z-50">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full">
            <div class="px-6 py-4 border-b border-gray-200">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-semibold text-gray-900">Edit Category</h3>
                    <button type="button"
                            onclick="closeEditModal()"
                            class="text-gray-400 hover:text-gray-500">
                        {% heroicon_outline "x-mark" size="20" %}
                    </button>
                </div>
            </div>
            <form method="post" id="editForm">
                {% csrf_token %}
                <div class="px-6 py-4 space-y-4">
                    <div class="space-y-4">
                        <div>{{ form.name|as_crispy_field }}</div>
                        <div>{{ form.description|as_crispy_field }}</div>
                    </div>
                </div>
                <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex justify-end gap-3">
                    <button type="button"
                            onclick="closeEditModal()"
                            class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Cancel
                    </button>
                    <button type="submit"
                            class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        {% heroicon_outline "check" size="16" class="inline mr-1" %}
                        Update Category
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    // Project PK for URL construction
    // Edit Modal Functions
    function openEditModal(id, name, description) {
        const modal = document.getElementById("editCategoryModal");
        const project_pk = {{ project.pk }};
        const nameInput = modal.querySelector('#id_name');
        const descriptionInput = modal.querySelector('#id_description');
        
        
        // Set values
        nameInput.value = name;
        descriptionInput.value = description;
        document.getElementById('editForm').action = "/project/" + project_pk + "/categories/" + id + "/update/";
        
        // Show modal
        modal.classList.remove('hidden');
        nameInput.focus();
    }

    function closeEditModal() {
        document.getElementById("editCategoryModal").classList.add('hidden');
    }

    // Form validation
    document.getElementById('editForm').addEventListener('submit', function(event) {
        const nameInput = modal.querySelector('#id_name');
        
        // Validate name is not empty
        if (!nameInput.value.trim()) {
            event.preventDefault();
            alert('Category name is required');
            nameError.classList.remove('hidden');
            nameInput.focus();
            return false;
        }
        
        return true;
    });

    // Close modals on escape key
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            closeEditModal();
        }
    });

    // Close modal when clicking outside
    document.getElementById("editCategoryModal").addEventListener('click', function(event) {
        if (event.target === this) {
            closeEditModal();
        }
    });

</script>
