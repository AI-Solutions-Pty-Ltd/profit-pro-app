<!-- Delete Modal -->
<div id="deleteGroupModal"
     class="hidden fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity z-50">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full">
            <div class="px-6 py-4 border-b border-gray-200">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-semibold text-gray-900">Delete Group</h3>
                    <button type="button"
                            onclick="closeDeleteGroupModal()"
                            class="text-gray-400 hover:text-gray-500">
                        {% heroicon_outline "x-mark" size="20" %}
                    </button>
                </div>
            </div>
            <form method="post" id="deleteForm">
                {% csrf_token %}
                <div class="px-6 py-4">
                    <div class="flex items-start">
                        <div class="flex-shrink-0">{% heroicon_outline "exclamation-triangle" size="24" class="text-red-600" %}</div>
                        <div class="ml-3 w-full">
                            <p class="text-sm text-gray-700">
                                Are you sure you want to delete the group
                                <span class="font-semibold" id="delete_group_name"></span>?
                            </p>
                            <p class="mt-2 text-sm text-gray-500" id="delete_warning"></p>
                        </div>
                    </div>
                </div>
                <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex justify-end gap-3">
                    <button type="button"
                            onclick="closeDeleteGroupModal()"
                            class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Cancel
                    </button>
                    <button type="submit"
                            class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                        {% heroicon_outline "trash" size="16" class="inline mr-1" %}
                        Delete Group
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    // Delete Modal Functions
    const deleteGroupModal = document.getElementById('deleteGroupModal')
    const deleteGroupForm = deleteGroupModal.querySelector("#deleteForm")

    function openDeleteGroupModal(id, name, subcategoryId, projectCount = 0) {
        deleteGroupModal.classList.remove('hidden');
        deleteGroupModal.dataset.id = id;
        deleteGroupModal.dataset.subcategoryId = subcategoryId;
        document.getElementById('delete_group_name').textContent = name;

        
        const warning = document.getElementById('delete_warning');
        if (projectCount > 0) {
            warning.textContent = `This group is currently used by ${projectCount} project${projectCount > 1 ? 's' : ''}. Projects will not be deleted, but they will no longer have this group assigned.`;
        } else {
            warning.textContent = 'This group is not currently used by any projects.';
        }
    }

    function closeDeleteGroupModal() {
        deleteGroupModal.classList.add('hidden');
    }

    // Close modals on escape key
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            closeDeleteGroupModal();
        }
    });


    deleteGroupModal.addEventListener('click', function(event) {
        if (event.target === this) closeDeleteGroupModal();
    });

    // Form submission
    deleteGroupForm.addEventListener('submit', async function(event) {
        event.preventDefault();
        id = deleteGroupModal.dataset.id;
        subcategoryId = deleteGroupModal.dataset.subcategoryId;
        const url = `/project/{{project.pk}}/subcategories/${subcategoryId}/groups/${id}/delete/`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ CSRF_TOKEN }}'
                },
            });
            
            const result = await response.json();
            
            if (result.success) {
                window.location.reload();
            } else {
                alert('Group could not be deleted');
                console.error('Errors:', result);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('An error occurred while deleting the group');
        }
    });
</script>
