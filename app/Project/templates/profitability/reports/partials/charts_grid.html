<div class="grid grid-cols-1 gap-6 mb-8 lg:grid-cols-2">
    <!-- Revenue vs. Cost Trend -->
    <div class="overflow-hidden bg-white border border-gray-100 shadow-sm card">
        <div class="flex justify-between items-center px-6 py-4 border-b border-gray-50 bg-gray-50/30">
            <h3 class="flex items-center text-xs font-black tracking-[0.1em] text-gray-500 uppercase">
                {% heroicon_outline "chart-bar" size="18" class="mr-2 text-indigo-500" %}
                Revenue vs Expense Trend
            </h3>
            <span class="badge badge-ghost text-[10px] uppercase font-bold tracking-tighter">Rolling 6 Months</span>
        </div>
        <div class="p-6 h-[320px]">
            <canvas id="revenueCostChart"></canvas>
        </div>
    </div>
    <!-- Monthly Profitability -->
    <div class="overflow-hidden bg-white border border-gray-100 shadow-sm card">
        <div class="flex justify-between items-center px-6 py-4 border-b border-gray-50 bg-gray-50/30">
            <h3 class="flex items-center text-xs font-black tracking-[0.1em] text-gray-500 uppercase">
                {% heroicon_outline "arrow-trending-up" size="18" class="mr-2 text-emerald-500" %}
                Net Profitability Trajectory
            </h3>
        </div>
        <div class="p-6 h-[350px]">
            <canvas id="netProfitChart"></canvas>
        </div>
    </div>
</div>
