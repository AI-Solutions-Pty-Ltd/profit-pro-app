{% load heroicons %}

<!-- Gantt Chart Container -->
<div class="flex overflow-hidden flex-col h-full bg-white border border-gray-100 shadow-sm gantt-container-section" id="gantt-section-container">
    <!-- Legend & Controls -->
    <div class="flex flex-wrap gap-4 justify-between items-center px-5 py-3 border-b border-gray-100 bg-gray-50/50">
        <div class="flex flex-wrap gap-4 items-center">
            <div class="flex items-center space-x-1.5">
                <div class="w-3 h-3 bg-indigo-500 rounded-sm"></div>
                <span class="text-[10px] font-bold uppercase tracking-wider text-gray-500">Summary</span>
            </div>
            <div class="flex items-center space-x-1.5">
                <div class="w-3 h-3 bg-sky-400 rounded-sm"></div>
                <span class="text-[10px] font-bold uppercase tracking-wider text-gray-500">Planned</span>
            </div>
            <div class="flex items-center space-x-1.5">
                <div class="w-3 h-3 bg-emerald-500 rounded-sm"></div>
                <span class="text-[10px] font-bold uppercase tracking-wider text-gray-500">Active</span>
            </div>
            <div class="flex items-center space-x-1.5">
                <div class="w-3 h-3 bg-rose-400 rounded-sm"></div>
                <span class="text-[10px] font-bold uppercase tracking-wider text-gray-500">Delayed (Forecast)</span>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <!-- Zoom controls -->
            <div class="flex items-center p-1 bg-white rounded-lg border border-gray-200 shadow-sm">
                <button type="button" id="zoom-out-btn" class="p-1.5 text-gray-500 rounded-md hover:bg-gray-50">
                    {% heroicon_outline "minus" class="w-4 h-4" %}
                </button>
                <span id="zoom-label" class="px-3 text-[10px] font-bold uppercase tracking-widest text-gray-600">Week</span>
                <button type="button" id="zoom-in-btn" class="p-1.5 text-gray-500 rounded-md hover:bg-gray-50">
                    {% heroicon_outline "plus" class="w-4 h-4" %}
                </button>
            </div>
            <!-- Hierarchy Controls -->
            <div class="flex items-center p-1 bg-white rounded-lg border border-gray-200 shadow-sm">
                <button type="button" id="expand-all-btn" title="Expand All" class="p-1.5 text-gray-500 rounded-md hover:bg-gray-50">
                    {% heroicon_outline "arrows-pointing-out" class="w-4 h-4" %}
                </button>
                <button type="button" id="collapse-all-btn" title="Collapse All" class="p-1.5 text-gray-500 rounded-md hover:bg-gray-50">
                    {% heroicon_outline "arrows-pointing-in" class="w-4 h-4" %}
                </button>
            </div>
        </div>
    </div>
    <!-- Gantt body: left label pane + right chart pane -->
    <div class="flex overflow-hidden flex-1 min-h-0" id="gantt-wrapper">
        <!-- Label Column (fixed width, sticky-like via container flex) -->
        <div class="flex z-10 flex-col flex-shrink-0 w-80 bg-white border-r border-gray-100" id="gantt-labels-container">
            <div class="h-[72px] border-b border-gray-100 flex items-center px-4 bg-gray-50/30">
                <h3 class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Production Activity</h3>
            </div>
            <div id="gantt-label-rows" class="overflow-hidden flex-1"></div>
        </div>
        <!-- Chart Area -->
        <div class="overflow-auto flex-1 scrollbar-thin scrollbar-thumb-slate-300" id="gantt-chart-scroll">
            <canvas id="gantt-canvas" class="block"></canvas>
        </div>
    </div>
</div>

<!-- Tooltip -->
<div id="gantt-tooltip" class=" fixed z-[100] px-4 py-3 max-w-xs rounded-xl border border-gray-100 shadow-2xl backdrop-blur-md transition-opacity duration-200 pointer-events-none bg-white/95">
    <div id="tooltip-title" class="mb-1 text-sm font-bold text-gray-900"></div>
    <div class="space-y-1">
        <div class="flex gap-4 justify-between">
            <span class="text-[9px] font-bold uppercase tracking-widest text-gray-400">Planned</span>
            <span id="tooltip-dates" class="text-[10px] font-mono text-gray-600"></span>
        </div>
        <div id="forecast-row" class="flex gap-4 justify-between">
            <span class="text-[9px] font-bold uppercase tracking-widest text-rose-500">Forecast</span>
            <span id="tooltip-forecast" class="text-[10px] font-mono text-rose-600"></span>
        </div>
        <div class="flex gap-4 justify-between">
            <span class="text-[9px] font-bold uppercase tracking-widest text-gray-400">Progress</span>
            <span id="tooltip-progress" class="text-[10px] font-bold text-indigo-600"></span>
        </div>
    </div>
</div>

<script>
// ── Data from Django ──────────────────────────────────────────────────────────
const GANTT_DATA = {{ gantt_data_json|safe }};

// ── Constants ─────────────────────────────────────────────────────────────────
const ROW_H   = 56;   // px per row
const HEAD_H  = 72;   // header height
const PAD_Y   = 14;   // vertical padding inside row
const BAR_H   = ROW_H - PAD_Y * 2;
const LABEL_W = 320;  // w-80

const ZOOM_LEVELS = [
    { label: 'Week', ppd: 4,  tick: 86400000 * 7 },
    { label: 'Day',  ppd: 18, tick: 86400000 },
];
let zoomIdx = 0; // Default to Week

// ── State ─────────────────────────────────────────────────────────────────────
const canvas  = document.getElementById('gantt-canvas');
const ctx     = canvas ? canvas.getContext('2d') : null;
const labelEl = document.getElementById('gantt-label-rows');
const wrapper = document.getElementById('gantt-chart-scroll');
const tooltip = document.getElementById('gantt-tooltip');

let collapsedState = new Set();
let highlightTaskId = null; // New state for integrated view

if (GANTT_DATA.length && canvas) {
    // Parse dates
    GANTT_DATA.forEach(d => {
        d.startTs = new Date(d.start_date).getTime();
        d.endTs   = new Date(d.finish_date).getTime();
        d.forecastTs = d.forecast_finish_date ? new Date(d.forecast_finish_date).getTime() : d.endTs;
    });

    // Initial Collapse: Hide everything below Bill level (depth 1)
    GANTT_DATA.forEach(r => {
        if (r.depth >= 1 && r.has_children) {
            collapsedState.add(r.id);
        }
    });

    const allStarts = GANTT_DATA.map(d => d.startTs);
    const allEnds   = GANTT_DATA.map(d => Math.max(d.endTs, d.forecastTs));
    let chartStart  = Math.min(...allStarts);
    let chartEnd    = Math.max(...allEnds);

    // Add padding
    const totalMs  = chartEnd - chartStart;
    chartStart    -= totalMs * 0.05;
    chartEnd      += totalMs * 0.1;

    const MS_PER_DAY = 86400000;
    const totalDays  = (chartEnd - chartStart) / MS_PER_DAY;

    function isRowVisible(row) {
        let pid = row.parent_id;
        while (pid) {
            if (collapsedState.has(pid)) return false;
            const parent = GANTT_DATA.find(r => r.id === pid);
            if (!parent) break;
            pid = parent.parent_id;
        }
        return true;
    }

    function getVisibleRows() {
        return GANTT_DATA.filter(isRowVisible);
    }

    function xForDate(ts) {
        const ppd = ZOOM_LEVELS[zoomIdx].ppd;
        return ((ts - chartStart) / MS_PER_DAY) * ppd;
    }

    function totalWidth() {
        return totalDays * ZOOM_LEVELS[zoomIdx].ppd;
    }

    function getBarColors(row) {
        const today = new Date(); today.setHours(0,0,0,0);
        const s = new Date(row.start_date); s.setHours(0,0,0,0);
        const e = new Date(row.finish_date); e.setHours(0,0,0,0);
        
        const isDelayed = row.forecastTs > row.endTs;
        
        if (row.has_children) return { fill: '#6366f1', stroke: '#4f46e5', type: 'parent' };
        if (s <= today && today <= e) return { fill: '#10b981', stroke: '#059669', type: 'active' };
        if (isDelayed) return { fill: '#f43f5e', stroke: '#e11d48', type: 'delayed' };
        return { fill: '#38bdf8', stroke: '#0ea5e9', type: 'planned' };
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    function render() {
        const visibleRows = getVisibleRows();
        const W = Math.max(wrapper.clientWidth, Math.ceil(totalWidth()));
        const H = HEAD_H + visibleRows.length * ROW_H;

        const dpr = window.devicePixelRatio || 1;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.scale(dpr, dpr);

        ctx.clearRect(0, 0, W, H);

        // 1. Header Background Layer 1 (Month/Year)
        ctx.fillStyle = '#f1f5f9';
        ctx.fillRect(0, 0, W, 36);
        
        // 2. Header Background Layer 2 (Ticks)
        ctx.fillStyle = '#f8fafc';
        ctx.fillRect(0, 36, W, 36);

        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, 36); ctx.lineTo(W, 36); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, HEAD_H); ctx.lineTo(W, HEAD_H); ctx.stroke();

        const zoom = ZOOM_LEVELS[zoomIdx];
        const ppd = zoom.ppd;
        const tickMs = zoom.tick;

        // Draw Layer 1: Month/Year Grouping (Sticky)
        ctx.fillStyle = '#475569';
        ctx.font = 'bold 11px Inter, sans-serif';
        ctx.textAlign = 'left';
        
        let monthPtr = new Date(chartStart);
        monthPtr.setHours(0,0,0,0);
        monthPtr.setDate(1); // Start of month

        const scrollLeft = wrapper.scrollLeft;

        while(monthPtr.getTime() < chartEnd) {
            const startX = xForDate(monthPtr.getTime());
            const nextMonth = new Date(monthPtr);
            nextMonth.setMonth(nextMonth.getMonth() + 1);
            const endX = xForDate(nextMonth.getTime());
            
            const label = monthPtr.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
            const textW = ctx.measureText(label).width;
            
            // Calculate sticky position
            // StartX + 12 (padding)
            // But don't let it go past endX - textW - 12
            const drawX = Math.min(
                Math.max(startX + 12, scrollLeft + 12),
                endX - textW - 12
            );

            // Only draw if within current month's bounds
            if (drawX < endX - 10) {
                ctx.fillText(label, drawX, 24);
            }
            
            // Month divider
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(startX, 0); ctx.lineTo(startX, 36); ctx.stroke();
            
            monthPtr = nextMonth;
        }

        // Draw Layer 2: Ticks (Days/Weeks)
        ctx.fillStyle = '#94a3b8';
        ctx.font = '9px "JetBrains Mono", monospace';
        ctx.textAlign = 'center';
        
        let cur = new Date(chartStart);
        cur.setHours(0,0,0,0);
        
        // Decimation logic: how many ticks to skip
        const sampleLabel = "Week 99";
        const minSpace = ctx.measureText(sampleLabel).width + 10;
        const skip = Math.max(1, Math.ceil(minSpace / (ppd * (tickMs / MS_PER_DAY))));

        let i = 0;
        while(cur.getTime() < chartEnd) {
            const x = xForDate(cur.getTime());
            if (x >= 0 && x <= W) {
                // Only draw text if decimation allows
                if (i % skip === 0) {
                    let fmt = d => d.getDate();
                    if (zoom.label === 'Week') fmt = d => 'Wk ' + getWeek(d);
                    if (zoom.label === 'Hour') fmt = d => d.getHours() + ':00';
                    
                    const labelStr = fmt(cur);
                    const labelW = ctx.measureText(labelStr).width;
                    const tickCenterX = x + (ppd * (tickMs / MS_PER_DAY)) / 2;
                    
                    // Don't draw if it hits the next tick or exceeds spacing
                    ctx.fillText(labelStr, tickCenterX, 58);
                }
                
                // Vertical Grid Line
                ctx.strokeStyle = '#f1f5f9';
                ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(x, 36); ctx.lineTo(x, H); ctx.stroke();
            }
            cur = new Date(cur.getTime() + tickMs);
            i++;
        }

        // 3. Draw Grid & Today Line
        const todayX = xForDate(Date.now());

        // 4. Draw Rows
        visibleRows.forEach((row, i) => {
            const y = HEAD_H + i * ROW_H;
            
            // Row background
            if (i % 2 === 1) {
                ctx.fillStyle = '#fafafa';
                ctx.fillRect(0, y, W, ROW_H);
            }
            
            // Selection Highlight
            if (row.id === highlightTaskId) {
                ctx.fillStyle = 'rgba(79, 70, 229, 0.08)';
                ctx.fillRect(0, y, W, ROW_H);
            }

            ctx.strokeStyle = '#f8fafc';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, y + ROW_H); ctx.lineTo(W, y + ROW_H); ctx.stroke();

            // Draw Bars
            const xPlanStart = xForDate(row.startTs);
            const xPlanEnd   = xForDate(row.endTs + MS_PER_DAY);
            const xForeEnd   = xForDate(row.forecastTs + MS_PER_DAY);
            
            const barY = y + PAD_Y;
            const colors = getBarColors(row);

            if (row.has_children) {
                // ── PARENT RENDERING (Sections/Bills) ────────────────────────
                const planW = Math.max(xPlanEnd - xPlanStart, 6);
                
                // 1. Draw Planned Bar (Indigo)
                ctx.fillStyle = '#6366f1';
                drawRoundedRect(ctx, xPlanStart, barY, planW, BAR_H, 4);
                ctx.fill();

                // 2. Draw Forecast extension if delayed (Rose)
                if (xForeEnd > xPlanEnd + 2) {
                    const delayW = xForeEnd - xPlanEnd;
                    ctx.fillStyle = 'rgba(244, 63, 94, 0.6)'; // Semi-transparent Rose
                    drawRoundedRect(ctx, xPlanEnd, barY, delayW, BAR_H, 4);
                    ctx.fill();
                    
                    // Add distinctive dashed border for forecast part
                    ctx.setLineDash([4, 2]);
                    ctx.strokeStyle = '#e11d48';
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // 3. Draw Stripe Pattern over entire parent span
                const totalW = Math.max(xForeEnd - xPlanStart, planW);
                ctx.save();
                drawRoundedRect(ctx, xPlanStart, barY, totalW, BAR_H, 4);
                ctx.clip();
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 4;
                for(let sx = xPlanStart - 20; sx < xPlanStart + totalW; sx += 8) {
                    ctx.beginPath(); ctx.moveTo(sx, barY); ctx.lineTo(sx + 20, barY + BAR_H); ctx.stroke();
                }
                ctx.restore();

            } else {
                // ── ACTIVITY RENDERING ────────────────────────────────────────
                // Draw Planned Ghost Bar (if different from forecast)
                if (Math.abs(xForeEnd - xPlanEnd) > 2) {
                    ctx.fillStyle = 'rgba(226, 232, 240, 0.5)';
                    drawRoundedRect(ctx, xPlanStart, barY, xPlanEnd - xPlanStart, BAR_H, 4);
                    ctx.fill();
                }

                // Draw Main Bar (Forecast/Actual)
                const mainW = Math.max(xForeEnd - xPlanStart, 6);
                ctx.fillStyle = colors.fill;
                
                // Add focus border if highlighted
                if (row.id === highlightTaskId) {
                    ctx.save();
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(79, 70, 229, 0.5)';
                    ctx.strokeStyle = '#4f46e5';
                    ctx.lineWidth = 2;
                    drawRoundedRect(ctx, xPlanStart - 1, barY - 1, mainW + 2, BAR_H + 2, 5);
                    ctx.stroke();
                    ctx.restore();
                }

                drawRoundedRect(ctx, xPlanStart, barY, mainW, BAR_H, 4);
                ctx.fill();

                // Draw Progress Fill (Indigo)
                if (row.progress_pct > 0 && !row.has_children) {
                    const progW = mainW * (row.progress_pct / 100);
                    ctx.save();
                    drawRoundedRect(ctx, xPlanStart, barY, progW, BAR_H, 4);
                    ctx.clip();
                    ctx.fillStyle = 'rgba(79, 70, 229, 0.3)'; // Indigo overlay for progress
                    ctx.fillRect(xPlanStart, barY, progW, BAR_H);
                    ctx.restore();
                }
            }
        });

        // Draw Dependencies
        const idxMap = {};
        visibleRows.forEach((r, i) => idxMap[r.id] = i);
        visibleRows.forEach((row, i) => {
            if (!row.predecessors) return;
            row.predecessors.forEach(predId => {
                const fromIdx = idxMap[predId];
                if (fromIdx === undefined) return;
                
                const fromRow = visibleRows[fromIdx];
                const fx = xForDate(fromRow.forecastTs + MS_PER_DAY);
                const fy = HEAD_H + fromIdx * ROW_H + ROW_H/2;
                const tx = xForDate(row.startTs);
                const ty = HEAD_H + i * ROW_H + ROW_H/2;

                ctx.strokeStyle = '#cbd5e1';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 2]);
                ctx.beginPath();
                ctx.moveTo(fx, fy);
                ctx.bezierCurveTo(fx + 20, fy, tx - 20, ty, tx, ty);
                ctx.stroke();
                ctx.setLineDash([]);
            });
        });

        // Today line
        if (todayX >= 0 && todayX <= W) {
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(todayX, HEAD_H); ctx.lineTo(todayX, H); ctx.stroke();
            ctx.fillStyle = '#ef4444';
            ctx.beginPath(); ctx.arc(todayX, HEAD_H, 3, 0, Math.PI*2); ctx.fill();
        }

        buildLabels();
    }

    function buildLabels() {
        labelEl.innerHTML = '';
        const visibleRows = getVisibleRows();
        visibleRows.forEach((row, i) => {
            const div = document.createElement('div');
            div.style.height = ROW_H + 'px';
            div.className = `flex items-center px-4 border-b border-gray-50 text-[11px] transition-colors ${row.has_children ? 'font-bold text-gray-900 bg-gray-50/20' : 'text-gray-600'}`;
            if (i % 2 === 1) div.style.backgroundColor = 'rgba(250, 250, 250, 0.5)';
            if (row.id === highlightTaskId) div.classList.add('bg-indigo-50/50');
            
            // Indentation
            const indent = document.createElement('div');
            indent.style.width = (row.depth * 16) + 'px';
            div.appendChild(indent);

            // Chevron for parents
            if (row.has_children) {
                const chevron = document.createElement('span');
                chevron.className = `mr-2 transition-transform ${collapsedState.has(row.id) ? '-rotate-90' : ''}`;
                chevron.innerHTML = '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>';
                chevron.style.cursor = 'pointer';
                chevron.onclick = (e) => {
                    e.stopPropagation();
                    if (collapsedState.has(row.id)) collapsedState.delete(row.id);
                    else collapsedState.add(row.id);
                    render();
                };
                div.appendChild(chevron);
            } else {
                const dot = document.createElement('div');
                dot.className = 'w-1 h-1 bg-gray-300 rounded-full mr-3 ml-1';
                div.appendChild(dot);
            }

            const text = document.createElement('span');
            text.className = 'truncate';
            text.textContent = row.activity;
            div.appendChild(text);

            labelEl.appendChild(div);
        });
    }

    // Zoom
    document.getElementById('zoom-in-btn').onclick = () => { if(zoomIdx < ZOOM_LEVELS.length - 1) { zoomIdx++; document.getElementById('zoom-label').textContent = ZOOM_LEVELS[zoomIdx].label; render(); } };
    document.getElementById('zoom-out-btn').onclick = () => { if(zoomIdx > 0) { zoomIdx--; document.getElementById('zoom-label').textContent = ZOOM_LEVELS[zoomIdx].label; render(); } };
    
    // Hierarchy
    document.getElementById('expand-all-btn').onclick = () => { collapsedState.clear(); render(); };
    document.getElementById('collapse-all-btn').onclick = () => { 
        GANTT_DATA.forEach(r => { if(r.has_children) collapsedState.add(r.id); });
        render(); 
    };

    // Tooltip
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseY = e.clientY - rect.top;
        const visibleRows = getVisibleRows();
        const rowIdx = Math.floor((mouseY - HEAD_H) / ROW_H);

        if (rowIdx >= 0 && rowIdx < visibleRows.length) {
            const row = visibleRows[rowIdx];
            const mouseX = e.clientX - rect.left;
            const x1 = xForDate(row.startTs);
            const x2 = xForDate(Math.max(row.endTs, row.forecastTs) + MS_PER_DAY);

            if (mouseX >= x1 && mouseX <= x2) {
                document.getElementById('tooltip-title').textContent = row.activity;
                document.getElementById('tooltip-dates').textContent = `${row.start_date} → ${row.finish_date}`;
                
                const forecastEl = document.getElementById('tooltip-forecast');
                const isDelayed = row.forecastTs > row.endTs + (1000 * 60 * 60); // More than 1 hour diff
                
                if (isDelayed) {
                    forecastEl.textContent = row.forecast_finish_date || row.finish_date;
                    document.getElementById('forecast-row').classList.remove('hidden');
                } else {
                    document.getElementById('forecast-row').classList.add('hidden');
                }
                
                document.getElementById('tooltip-progress').textContent = `${row.progress_pct}%`;
                
                tooltip.style.left = (e.clientX + 16) + 'px';
                tooltip.style.top = (e.clientY - 16) + 'px';
                tooltip.style.opacity = '1';
                tooltip.classList.remove('hidden');
                return;
            }
        }
        tooltip.classList.add('hidden');
        tooltip.style.opacity = '0';
    });

    canvas.addEventListener('mouseleave', () => tooltip.classList.add('hidden'));

    function getWeek(d) {
        const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
        const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
        return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
    }

    // Integrated View synchronization function
    window.scrollToTask = function(taskId) {
        // Find task index in visible rows
        const visibleRows = getVisibleRows();
        const rowIdx = visibleRows.findIndex(r => r.id === parseInt(taskId));
        
        if (rowIdx !== -1) {
            highlightTaskId = parseInt(taskId);
            const row = visibleRows[rowIdx];
            
            // Scroll vertical
            const targetY = HEAD_H + rowIdx * ROW_H;
            const wrapperCenter = wrapper.clientHeight / 2;
            wrapper.scrollTop = Math.max(0, targetY - wrapperCenter + ROW_H/2);

            // Scroll horizontal
            const targetX = xForDate(row.startTs);
            const wrapperWidth = wrapper.clientWidth / 2;
            wrapper.scrollLeft = Math.max(0, targetX - wrapperWidth);
            
            render();
            
            // Momentary highlight effect
            setTimeout(() => {
                highlightTaskId = null;
                render();
            }, 2000);
        } else {
            // Check if it's collapsed
            const plan = GANTT_DATA.find(p => p.id === parseInt(taskId));
            if (plan && plan.parent_id) {
                // Auto-expand parent
                collapsedState.delete(plan.parent_id);
                render();
                scrollToTask(taskId);
            }
        }
    };

    render();
    window.addEventListener('resize', render);
    document.getElementById('zoom-label').textContent = ZOOM_LEVELS[zoomIdx].label;

    // ── Vertical Scroll Synchronization & Sticky Header Update ────────────────
    let lastScrollLeft = wrapper.scrollLeft;
    wrapper.addEventListener('scroll', function() {
        labelEl.scrollTop = wrapper.scrollTop;
        
        // Only re-render if we scrolled horizontally (for sticky headers)
        if (wrapper.scrollLeft !== lastScrollLeft) {
            lastScrollLeft = wrapper.scrollLeft;
            render();
        }
    });

    // Forward mousewheel from labels to chart
    labelEl.addEventListener('wheel', function(e) {
        wrapper.scrollTop += e.deltaY;
        e.preventDefault();
    }, { passive: false });

    // Sync labels scrollTop initially
    labelEl.scrollTop = wrapper.scrollTop;
}
</script>
