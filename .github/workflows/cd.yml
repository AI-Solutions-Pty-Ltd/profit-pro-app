name: CD - Deploy to Production

on:
  push:
    branches: [main, staging, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
          - develop

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.base_ref == 'develop') }}
    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/staging' && 'staging') || (github.ref == 'refs/heads/develop' && 'development') || 'production' }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/staging' && 'staging') || (github.ref == 'refs/heads/develop' && 'development') || 'production' }}

    steps:
      - uses: actions/checkout@v5

      - name: Display Deployment Environment
        run: |
          echo "🚀 Deploying to ${{ env.DEPLOY_ENVIRONMENT }} environment"
          echo "Branch: ${{ github.ref }}"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Environment: ${{ env.DEPLOY_ENVIRONMENT }}"

      - name: Generate Production Secret Key
        id: generate-secret
        run: |
          SECRET_KEY=$(openssl rand -base64 50 | tr -dc 'A-Za-z0-9!@#$%^&*(-_=+)')
          echo "SECRET_KEY=$SECRET_KEY" >> $GITHUB_ENV
          echo "secret_key=$SECRET_KEY" >> $GITHUB_OUTPUT

      - name: Create ${{ env.DEPLOY_ENVIRONMENT }} .env File
        run: |
          touch .env
          # Core settings
          echo "SITE_NAME=${{ vars.SITE_NAME }}" >> .env
          echo "DJANGO_SETTINGS_MODULE=${{ vars.DJANGO_SETTINGS_MODULE }}" >> .env
          echo "SECRET_KEY=${{ env.SECRET_KEY }}" >> .env
          echo "ALLOWED_HOSTS=${{ vars.ALLOWED_HOSTS }}" >> .env

          # Database settings
          echo "DB=${{ vars.DB }}" >> .env
          echo "DB_HOST=${{ vars.DB_HOST }}" >> .env
          echo "DB_USER=${{ vars.DB_USER }}" >> .env
          echo "DB_USER_PWD=${{ secrets.DB_USER_PWD }}" >> .env

          # Static files settings
          echo "STATIC_ROOT=${{ vars.STATIC_ROOT }}" >> .env
          echo "STATIC_URL=${{ vars.STATIC_URL }}" >> .env

          # Email settings
          echo "ADMIN_EMAIL=${{ vars.ADMIN_EMAIL }}" >> .env
          echo "DEFAULT_EMAIL_HOST=${{ vars.DEFAULT_EMAIL_HOST }}" >> .env
          echo "DEFAULT_FROM_EMAIL=${{ vars.DEFAULT_FROM_EMAIL }}" >> .env
          echo "EMAIL_HOST=${{ vars.EMAIL_HOST }}" >> .env
          echo "EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}" >> .env
          echo "EMAIL_HOST_USER=${{ vars.EMAIL_HOST_USER }}" >> .env
          echo "EMAIL_PORT=${{ vars.EMAIL_PORT }}" >> .env
          echo "EMAIL_USE_SSL=${{ vars.EMAIL_USE_SSL }}" >> .env
          echo "EMAIL_USE_TLS=${{ vars.EMAIL_USE_TLS }}" >> .env
          echo "USE_EMAIL=${{ vars.USE_EMAIL }}" >> .env

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/theme/static_src/package-lock.json

      - name: Install Node dependencies
        working-directory: app/theme/static_src
        run: npm ci

      - name: Build Tailwind CSS
        working-directory: app/theme/static_src
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements/*.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config default-libmysqlclient-dev build-essential

      - name: Install Python dependencies
        run: pip install -r requirements/prod.txt

      - name: Collect static files
        run: |
          # collectstatic must write somewhere the runner can write to, so
          # point STATIC_ROOT at the workspace for this step only. The .env is
          # restored afterwards because settings load it with load_dotenv().
          cp .env .env.bak
          sed -i "s#^STATIC_ROOT=.*#STATIC_ROOT=${{ github.workspace }}/staticfiles#" .env
          python manage.py collectstatic --noinput --clear
          mv .env.bak .env

      - name: Derive FTP static directory
        id: ftp_static
        env:
          STATIC_ROOT: ${{ vars.STATIC_ROOT }}
        run: |
          # STATIC_ROOT is an absolute server path; the FTP server-dir is
          # relative to the FTP account home (/home/<user>/), so strip it.
          REL="${STATIC_ROOT#/home/*/}"
          echo "dir=$REL" >> "$GITHUB_OUTPUT"
          echo "Static files will deploy to FTP dir: $REL"

      - name: FTP Deploy (application code)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ vars.FTP_SERVER }}
          username: ${{ vars.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ vars.FTP_BACKEND_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/staticfiles/**

      - name: FTP Deploy (collected static files)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ vars.FTP_SERVER }}
          username: ${{ vars.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ steps.ftp_static.outputs.dir }}
          local-dir: ./staticfiles/
